apiVersion: gateway.networking.k8s.io/v1

kind: Gateway

metadata:

  name: http

  namespace: kgateway-system

spec:

  gatewayClassName: kgateway

  listeners:

  - name: http

    protocol: HTTP

    port: 80

    allowedRoutes:

      namespaces:

        from: All

---

# 1. Frontend Route (HTML Web App)

apiVersion: gateway.networking.k8s.io/v1

kind: HTTPRoute

metadata:

  name: frontend-route

  namespace: default

spec:

  parentRefs:

  - name: http

    namespace: kgateway-system

  rules:

  - matches:

    - path:

        type: PathPrefix

        value: /

    backendRefs:

    - name: frontend

      port: 80

---

# 2. Cart Service Route (gRPC)

apiVersion: gateway.networking.k8s.io/v1

kind: HTTPRoute

metadata:

  name: cart-route

  namespace: default

spec:

  parentRefs:

  - name: http

    namespace: kgateway-system

  rules:

  - matches:

    - path:

        type: PathPrefix

        value: /hipstershop.CartService/

    backendRefs:

    - name: cartservice

      port: 7070

---

